<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{PRODUCT_NAME}} - Competitor teardown</title>
<script>(function(){try{if(localStorage.getItem("{{PRODUCT_SLUG}}-theme")==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}})();
function toggleTheme(){var h=document.documentElement;if(h.getAttribute("data-theme")==="light"){h.removeAttribute("data-theme");try{localStorage.setItem("{{PRODUCT_SLUG}}-theme","dark")}catch(e){}}else{h.setAttribute("data-theme","light");try{localStorage.setItem("{{PRODUCT_SLUG}}-theme","light")}catch(e){}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           hsl(240 14% 5%);
  --surface:      hsl(240 10% 9%);
  --surface2:     hsl(240 9% 12%);
  --surface3:     hsl(240 9% 16%);
  --border:       hsl(240 10% 18%);
  --border-soft:  hsl(240 9% 13%);
  --border-mid:   hsl(240 8% 28%);
  --text:         hsl(0 0% 98%);
  --text-mid:     hsl(225 6% 91%);
  --text-muted:   hsl(225 5% 83%);
  --text-faint:   hsl(225 5% 73%);
  /* founder accent ramp, recolored per-build (same placeholder the dashboard uses) */
  {{THEME_ACCENT_DARK}}
  --purple:       hsl(265 72% 75%);
  --purple-dark:  hsl(265 80% 81%);
  --purple-tint:  hsl(265 70% 70% / .16);
  --red:          hsl(2 78% 64%);
  --red-tint:     hsl(2 78% 64% / .16);
  --teal:         hsl(205 72% 64%);
  --teal-tint:    hsl(205 70% 60% / .16);
  --font-display: 'Space Grotesk', 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-sans:    'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-num:     'Newsreader', Georgia, 'Times New Roman', serif;
}
:root[data-theme="light"]{
  --bg:hsl(0 0% 98%);--surface:hsl(0 0% 100%);--surface2:hsl(0 0% 96%);--surface3:hsl(0 0% 92%);--border:hsl(0 0% 88%);--border-soft:hsl(0 0% 94%);--border-mid:hsl(0 0% 80%);
  --text:hsl(0 0% 10%);--text-mid:hsl(0 0% 28%);--text-muted:hsl(0 0% 45%);--text-faint:hsl(0 0% 62%);
  {{THEME_ACCENT_LIGHT}}
  --purple:hsl(265 55% 58%);--purple-dark:hsl(265 55% 48%);--purple-tint:hsl(265 55% 58% / .1);
  --red:hsl(0 72% 51%);--red-tint:hsl(0 72% 51% / .15);--teal:hsl(215 60% 52%);--teal-tint:hsl(215 60% 52% / .12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html, body{font-family:var(--font-sans);}
body{background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
button{font-family:inherit;}
a{color:inherit;}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--surface);position:sticky;top:0;z-index:200;}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:24px;height:24px;color:var(--green);}
.logo-mark svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.product-name{font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:-.01em;}
.crumb{font-size:13px;color:var(--text-faint);}
.crumb a{color:var(--text-muted);text-decoration:none;}
.crumb a:hover{color:var(--green);}
.shell-right{display:flex;align-items:center;gap:12px;}
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all 140ms;padding:0;}
.theme-toggle:hover{color:var(--text);border-color:var(--border-mid);}
.theme-toggle svg{width:15px;height:15px;}
.theme-toggle .icon-moon{display:none;}
:root[data-theme="light"] .theme-toggle .icon-sun{display:none;}
:root[data-theme="light"] .theme-toggle .icon-moon{display:inline-block;}
.main{max-width:1120px;margin:0 auto;padding:32px 24px 80px;}
.page-head{margin-bottom:8px;}
.eyebrow{font-family:var(--font-display);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.page-title{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.02em;}
.page-sub{font-size:14.5px;color:var(--text-muted);line-height:1.55;max-width:70ch;margin-top:8px;}
.section-label{font-family:var(--font-display);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin:36px 0 14px;}
/* market map */
.map-wrap{border:1px solid var(--border);border-radius:12px;background:var(--surface);padding:18px;}
.map-svg{width:100%;height:auto;display:block;}
.map-axis-line{stroke:var(--border-mid);stroke-width:1;}
.map-axis-label{fill:var(--text-muted);font-family:var(--font-sans);font-size:11px;}
.map-axis-end{fill:var(--text-faint);font-family:var(--font-sans);font-size:10px;}
.map-dot{fill:var(--text-faint);}
.map-dot-founder{fill:var(--green);}
.map-node-label{fill:var(--text-mid);font-family:var(--font-sans);font-size:11px;}
.map-node-label-founder{fill:var(--green);font-weight:600;}
/* teardown cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.cmp-card{border:1px solid var(--border);border-radius:12px;background:var(--surface);padding:20px;display:flex;flex-direction:column;gap:12px;}
.cmp-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.cmp-name{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em;}
.cmp-cat{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;}
.cmp-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
.cmp-meta b{color:var(--text-mid);font-weight:600;}
.cmp-one{font-size:14px;color:var(--text-mid);line-height:1.5;}
.cmp-pos{font-size:13px;color:var(--text-muted);line-height:1.55;}
.cmp-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cmp-col h4{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.cmp-col.str h4{color:var(--q-high, var(--teal));}
.cmp-col.weak h4{color:var(--red);}
.cmp-col ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
.cmp-col li{font-size:12.5px;color:var(--text-muted);line-height:1.45;padding-left:12px;position:relative;}
.cmp-col li::before{content:"";position:absolute;left:0;top:7px;width:4px;height:4px;border-radius:50%;background:var(--border-mid);}
.cmp-win{border-top:1px solid var(--border-soft);padding-top:12px;font-size:13px;color:var(--text-mid);line-height:1.55;}
.cmp-win b{color:var(--green);font-weight:600;}
.cmp-customers{font-size:12px;color:var(--text-muted);}
.cmp-sources{display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border-soft);padding-top:10px;}
.cmp-source{font-size:11.5px;color:var(--purple-dark);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;}
.cmp-source:hover{border-color:var(--purple);}
.summary-note{margin-top:28px;font-size:13px;color:var(--text-muted);line-height:1.6;max-width:78ch;border-left:2px solid var(--border-mid);padding-left:14px;}
/* empty state (mirrors the dashboard's Network empty state) */
.cmp-empty{border:1px dashed var(--border-mid);border-radius:10px;background:var(--surface);padding:48px 28px;text-align:center;margin-top:24px;}
.cmp-empty .es-icon{width:40px;height:40px;margin:0 auto 14px;color:var(--text-faint);}
.cmp-empty .es-icon svg{width:40px;height:40px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.cmp-empty .es-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.cmp-empty .es-body{font-size:12.5px;color:var(--text-muted);line-height:1.55;max-width:440px;margin:0 auto;}
@media (max-width:560px){.cmp-cols{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="brand" onclick="window.location.href='dashboard.html'" title="Back to the dashboard">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/><circle cx="12" cy="12" r="2.5"/></svg></div>
      <span class="product-name">{{PRODUCT_NAME}}</span>
    </div>
    <span class="crumb"><a href="dashboard.html">Dashboard</a> / Competitors</span>
  </div>
  <div class="shell-right">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light or dark mode" title="Toggle light / dark"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
</header>

<main class="main">
  <div class="page-head">
    <div class="eyebrow">Competitor teardown</div>
    <h1 class="page-title">Who else is chasing this buyer</h1>
    <p class="page-sub" id="cmp-lede"></p>
  </div>
  <div id="cmp-root"></div>
</main>

<script src="competitors-data.js"></script>
<script>
(function(){
  var data = window.COMPETITORS_DATA || null;
  var root = document.getElementById("cmp-root");
  var lede = document.getElementById("cmp-lede");

  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
  function isHttps(u){ return typeof u === "string" && /^https:\/\//i.test(u); }

  function emptyState(title, body){
    return '<div class="cmp-empty">' +
      '<div class="es-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5v4M10.5 13l-4 4M13.5 13l4 4"/></svg></div>' +
      '<div class="es-title">' + esc(title) + '</div>' +
      '<div class="es-body">' + esc(body) + '</div>' +
    '</div>';
  }

  // Degrade exactly like the dashboard's Network tab: no data, or an explicit
  // non-ok build_status, renders the designed empty state (never an error).
  if (!data || data.build_status !== "ok" || !Array.isArray(data.competitors) || !data.competitors.length){
    lede.textContent = "";
    root.innerHTML = emptyState(
      "Competitor teardown unavailable",
      "No competitor analysis was produced for this build. When the teardown runs, each competitor and a positioning map appear here."
    );
    return;
  }

  if (data.founder && data.founder.positioning) lede.textContent = data.founder.positioning;

  // ---- market map (inline SVG, 0..100 coordinate space) --------------------
  function marketMap(mm){
    if (!mm || !mm.axis_x || !mm.axis_y || !Array.isArray(mm.placements) || !mm.placements.length) return "";
    var W = 720, H = 460, pad = 54;
    var sx = function(x){ return pad + (Math.max(0, Math.min(100, x)) / 100) * (W - 2 * pad); };
    var sy = function(y){ return (H - pad) - (Math.max(0, Math.min(100, y)) / 100) * (H - 2 * pad); };
    var parts = [];
    parts.push('<svg class="map-svg" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Competitive market map">');
    parts.push('<line class="map-axis-line" x1="' + pad + '" y1="' + (H - pad) + '" x2="' + (W - pad) + '" y2="' + (H - pad) + '"/>');
    parts.push('<line class="map-axis-line" x1="' + pad + '" y1="' + pad + '" x2="' + pad + '" y2="' + (H - pad) + '"/>');
    // x axis labels
    parts.push('<text class="map-axis-end" x="' + pad + '" y="' + (H - pad + 20) + '" text-anchor="start">' + esc(mm.axis_x.low) + '</text>');
    parts.push('<text class="map-axis-end" x="' + (W - pad) + '" y="' + (H - pad + 20) + '" text-anchor="end">' + esc(mm.axis_x.high) + '</text>');
    parts.push('<text class="map-axis-label" x="' + (W / 2) + '" y="' + (H - 12) + '" text-anchor="middle">' + esc(mm.axis_x.label) + '</text>');
    // y axis labels
    parts.push('<text class="map-axis-end" x="' + (pad - 8) + '" y="' + (H - pad) + '" text-anchor="end">' + esc(mm.axis_y.low) + '</text>');
    parts.push('<text class="map-axis-end" x="' + (pad - 8) + '" y="' + (pad + 6) + '" text-anchor="end">' + esc(mm.axis_y.high) + '</text>');
    parts.push('<text class="map-axis-label" transform="translate(16 ' + (H / 2) + ') rotate(-90)" text-anchor="middle">' + esc(mm.axis_y.label) + '</text>');
    mm.placements.forEach(function(p){
      var cx = sx(p.x), cy = sy(p.y), founder = p.is_founder === true;
      parts.push('<circle class="' + (founder ? "map-dot-founder" : "map-dot") + '" data-founder="' + (founder ? "1" : "0") + '" cx="' + cx + '" cy="' + cy + '" r="' + (founder ? 7 : 5) + '"/>');
      parts.push('<text class="' + (founder ? "map-node-label map-node-label-founder" : "map-node-label") + '" x="' + (cx + 9) + '" y="' + (cy + 4) + '">' + esc(p.name) + '</text>');
    });
    parts.push('</svg>');
    return '<div class="map-wrap">' + parts.join("") + '</div>';
  }

  function list(items){
    if (!Array.isArray(items) || !items.length) return '<li>Not documented.</li>';
    return items.map(function(i){ return '<li>' + esc(i) + '</li>'; }).join("");
  }

  function card(c){
    var meta = [];
    if (c.funding_stage) meta.push('<span><b>Stage</b> ' + esc(c.funding_stage) + '</span>');
    if (c.pricing_model) meta.push('<span><b>Pricing</b> ' + esc(c.pricing_model) + '</span>');
    if (c.domain) meta.push('<span><b>Site</b> ' + esc(c.domain) + '</span>');
    var customers = Array.isArray(c.notable_customers) && c.notable_customers.length
      ? '<div class="cmp-customers"><b>Customers:</b> ' + c.notable_customers.map(esc).join(", ") + '</div>' : "";
    var sources = (Array.isArray(c.sources) ? c.sources : []).filter(function(s){ return s && isHttps(s.url); })
      .map(function(s){ return '<a class="cmp-source" href="' + esc(s.url) + '" target="_blank" rel="noreferrer noopener">' + esc(s.title || s.url) + '</a>'; }).join("");
    return '<div class="cmp-card">' +
      '<div class="cmp-head"><span class="cmp-name">' + esc(c.name) + '</span><span class="cmp-cat">' + esc(c.category) + '</span></div>' +
      (meta.length ? '<div class="cmp-meta">' + meta.join("") + '</div>' : "") +
      (c.one_liner ? '<div class="cmp-one">' + esc(c.one_liner) + '</div>' : "") +
      (c.positioning ? '<div class="cmp-pos">' + esc(c.positioning) + '</div>' : "") +
      '<div class="cmp-cols">' +
        '<div class="cmp-col str"><h4>Strengths</h4><ul>' + list(c.strengths) + '</ul></div>' +
        '<div class="cmp-col weak"><h4>Weaknesses</h4><ul>' + list(c.weaknesses) + '</ul></div>' +
      '</div>' +
      customers +
      (c.why_founder_wins ? '<div class="cmp-win"><b>Where we win:</b> ' + esc(c.why_founder_wins) + '</div>' : "") +
      (sources ? '<div class="cmp-sources">' + sources + '</div>' : "") +
    '</div>';
  }

  var html = "";
  var mapHtml = marketMap(data.market_map);
  if (mapHtml) html += '<div class="section-label">Where everyone sits</div>' + mapHtml;
  html += '<div class="section-label">The field</div><div class="cards">' + data.competitors.map(card).join("") + '</div>';
  if (data.summary) html += '<div class="summary-note">' + esc(data.summary) + '</div>';
  root.innerHTML = html;
})();
</script>
</body>
</html>
